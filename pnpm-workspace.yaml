packages:
  # Production workspace packages.  Each one is listed explicitly so a
  # future sandbox / experiment package dropped into artifacts/ is NOT
  # silently included in CI, builds, or production deploys.
  - artifacts/api-server
  - artifacts/dropflow
  - lib/api-zod
  - lib/api-client-react
  - lib/db
  - lib/integrations
  - scripts

  # `mockup-sandbox` is intentionally excluded from the workspace.
  # It is a free-standing UI prototyping playground kept under
  # artifacts/ for reference only.  It is NOT built, NOT deployed,
  # NOT installed in CI, and NOT shipped to customers.  If you need
  # to work on it locally, install it manually:
  #     cd artifacts/mockup-sandbox && pnpm install
  # Re-add it to this list only if you decide to ship it.

allowBuilds:
  "@firebase/util": true
  esbuild: true
  msw: false
  protobufjs: true

autoInstallPeers: true

catalog:
  "@tailwindcss/vite": ^4.1.14
  "@tanstack/react-query": ^5.90.21
  "@types/node": ^25.3.3
  "@types/react": ^19.2.0
  "@types/react-dom": ^19.2.0
  "@vitejs/plugin-react": ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: 4.21.0
  typescript: ^5.9.3
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

onlyBuiltDependencies:
  - "@swc/core"
  - esbuild
  - msw
  - unrs-resolver
