kind = "web"
previewPath = "/"
title = "DropFlow"
version = "1.0.0"
id = "artifacts/dropflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19582

[services.development]
run = "pnpm --filter @workspace/dropflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dropflow", "run", "build" ]
publicDir = "artifacts/dropflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19582"
BASE_PATH = "/"
