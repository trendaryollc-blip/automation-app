name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: |
          pnpm --filter @workspace/api-zod run --if-present build
          pnpm --filter @workspace/db run --if-present build
          pnpm --filter @workspace/api-client-react run --if-present build
          pnpm --filter './artifacts/**' run --if-present build
          pnpm --filter './scripts/**' run --if-present build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/dropflow' }}
          DB_MODE: postgres
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-must-be-32-chars-long-please' }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN || '*' }}
      - run: pnpm run typecheck
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/dropflow' }}
          DB_MODE: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-must-be-32-chars-long-please' }}
      - run: pnpm run test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/dropflow' }}
          DB_MODE: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-must-be-32-chars-long-please' }}
      - name: Run E2E tests (Playwright)
        run: |
          pnpm install --frozen-lockfile
          # start servers in background with explicit ports
          DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/dropflow' }} DB_MODE=postgres PORT=8080 JWT_SECRET=ci-jwt-secret-must-be-32-chars-long-please pnpm --filter @workspace/api-server run dev > /tmp/api-server.log 2>&1 &
          VITE_API_URL=http://localhost:8080 pnpm --filter @workspace/dropflow run dev > /tmp/dropflow.log 2>&1 &

          echo "Waiting for API server to be available..."
          for i in $(seq 1 20); do
            if curl --silent --fail http://localhost:8080/api/healthz; then
              break
            fi
            sleep 1
          done

          curl --silent --fail http://localhost:8080/api/healthz || (echo "API server did not start in time"; cat /tmp/api-server.log; exit 1)
          pnpm run test:e2e
      - name: Enforce coverage thresholds
        run: |
          node scripts/check-coverage.cjs
